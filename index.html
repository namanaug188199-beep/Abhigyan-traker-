<!DOCTYPE html>
<html>
<head>
  <title>Study Tree Tracker</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(to bottom,#000000,#052e16);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:#111827;
      padding:30px;
      border-radius:25px;
      text-align:center;
      width:320px;
      box-shadow:0 0 20px rgba(0,255,100,0.3);
    }

    .plant{
      font-size:80px;
      margin:20px;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:15px;
      margin:10px;
      font-size:16px;
      cursor:pointer;
    }

    .start{
      background:green;
      color:white;
    }

    .stop{
      background:red;
      color:white;
    }

    .credit{
      margin-top:20px;
      color:lightgray;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>Study Tree Tracker</h1>

  <div class="plant" id="plant">🌱</div>

  <h2 id="time">0h 0m</h2>

  <button class="start" onclick="startTimer()">Start</button>
  <button class="stop" onclick="stopTimer()">Stop</button>

  <p>Trees Grown: <span id="trees">0</span></p>

  <div class="credit">
    By Abhigyan Shahi
  </div>

</div>

<script>

let minutes = 0;
let trees = 0;
let timer;

function updatePlant(){
  const plant = document.getElementById("plant");

  if(trees == 0) plant.innerHTML = "🌱";
  else if(trees == 1) plant.innerHTML = "🪴";
  else if(trees == 2) plant.innerHTML = "🌿";
  else if(trees == 3) plant.innerHTML = "🌳";
  else plant.innerHTML = "🌲";
}

function startTimer(){

  timer = setInterval(()=>{

    minutes++;

    let hrs = Math.floor(minutes/60);
    let mins = minutes%60;

    document.getElementById("time").innerHTML =
    hrs + "h " + mins + "m";

    if(minutes % 60 == 0){
      trees++;
      document.getElementById("trees").innerHTML = trees;
      updatePlant();
    }

  },1000);

}

function stopTimer(){
  clearInterval(timer);
}

</script>

</body>
</html>
